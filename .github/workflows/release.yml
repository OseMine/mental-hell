name: Build & Release (Web, APK, IPA)

on:
  push:
    branches: [ main ]
    paths:
      - 'package.json'
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.1)'
        required: true
        type: string

permissions:
  contents: write
  discussions: write

jobs:
  check-version:
    name: Check Version Change
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get Current Version
        id: get-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if Version Changed
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "Nightly build, building without version change."
          else
            PREV_VERSION=$(git show HEAD~1:package.json 2>/dev/null | node -p "try{JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version}catch(e){''}" || echo "")
            CURR_VERSION="${{ steps.get-version.outputs.version }}"
            if [ "$PREV_VERSION" != "$CURR_VERSION" ]; then
              echo "should_release=true" >> $GITHUB_OUTPUT
            else
              echo "should_release=false" >> $GITHUB_OUTPUT
              echo "Version unchanged ($CURR_VERSION), skipping release."
            fi
          fi

  release-notes:
    name: Generate AI Release Notes
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      notes: ${{ steps.ai-notes.outputs.notes }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        id: ai-notes
        uses: actions/github-script@v7
        with:
          script: |
            const { data: commits } = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 50,
            });
            const messages = commits.map(c => c.commit.message.split('\n')[0]).filter(Boolean);
            let notes = '# Release Notes\n\n## What changed\n\n';
            for (const msg of messages) {
              notes += `- ${msg}\n`;
            }
            notes += '\n---\n*Generated by AI Release Notes*';
            return notes;

  web-build:
    name: Build Web
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web
        run: npx expo export --platform web

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist/

  android-build:
    name: Build Android APK
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: npm ci

      - name: Prebuild Android
        run: npx expo prebuild --platform android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/app-release.apk

  ios-build:
    name: Build iOS IPA
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: macos-15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build Unsigned IPA
        run: |
          xcodebuild -workspace ios/*.xcworkspace \
            -scheme $(basename ios/*.xcworkspace .xcworkspace) \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r ios-unsigned-app.ipa Payload
          rm -rf Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ios-unsigned-app.ipa

  create-release:
    name: Create GitHub Release
    needs: [check-version, release-notes, web-build, android-build, ios-build]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get Version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Get Date
        id: date
        if: github.event_name == 'schedule'
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Download All Artifacts
        uses: actions/download-artifact@v4

      - name: Create Nightly Release
        if: github.event_name == 'schedule'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ steps.date.outputs.date }}
          name: Nightly Build ${{ steps.date.outputs.date }}
          body: ${{ needs.release-notes.outputs.notes }}
          files: |
            web-build/**
            android-apk/app-release.apk
            ios-ipa/ios-unsigned-app.ipa
          draft: false
          prerelease: true
          generate_release_notes: false

      - name: Create Versioned Release
        if: github.event_name != 'schedule'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: ${{ needs.release-notes.outputs.notes }}
          files: |
            web-build/**
            android-apk/app-release.apk
            ios-ipa/ios-unsigned-app.ipa
          draft: false
          prerelease: false
          generate_release_notes: false
