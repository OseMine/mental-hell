name: Native Android Build (Ohne EAS)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Wichtig für moderne Expo/Android-Builds

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: npm ci

      - name: Generate Native Android Folder
        # Erstellt den /android Ordner basierend auf deiner app.json
        run: npx expo prebuild --platform android

      - name: Build APK with Gradle
        # Führt den nativen Android-Build aus
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-build
          # Gradle legt die fertige APK standardmäßig in diesem Verzeichnis ab:
          path: android/app/build/outputs/apk/release/app-release.apk
